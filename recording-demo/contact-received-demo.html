<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>方舟 - 监护人关怀提醒演示</title>
    <style>
      :root {
        --paper: #f7efe3;
        --screen: #fff8ee;
        --card: #fffdf8;
        --card-2: #fff2e8;
        --coral: #f36f5e;
        --coral-dark: #de5a4d;
        --sage: #5a968d;
        --sage-dark: #3f756f;
        --sage-soft: #dcece5;
        --amber: #f4b36a;
        --text: #392218;
        --muted: #7d6759;
        --line: #ead9c7;
        --shadow: 0 22px 60px rgba(71, 48, 35, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 28% 18%, rgba(244, 179, 106, 0.24), transparent 28%),
          radial-gradient(circle at 78% 70%, rgba(90, 150, 141, 0.18), transparent 30%),
          linear-gradient(135deg, #fff9ef 0%, var(--paper) 52%, #f1e3d4 100%);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      .stage {
        position: relative;
        width: min(92vw, 420px);
        aspect-ratio: 390 / 844;
        opacity: 0;
        transform: translateY(22px) scale(0.985);
        animation: stage-in 700ms ease forwards;
      }

      .phone {
        position: absolute;
        inset: 0;
        padding: 12px;
        border-radius: 54px;
        background: linear-gradient(145deg, #17130f, #403b34 42%, #0c0a08 100%);
        box-shadow: var(--shadow), inset 0 0 0 2px rgba(255, 255, 255, 0.14);
      }

      .phone::before,
      .phone::after {
        position: absolute;
        content: "";
        top: 116px;
        width: 4px;
        border-radius: 999px;
        background: #2f2924;
      }

      .phone::before {
        left: -3px;
        height: 72px;
      }

      .phone::after {
        right: -3px;
        height: 98px;
      }

      .screen {
        position: relative;
        height: 100%;
        overflow: hidden;
        border-radius: 43px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.66), transparent 24%),
          radial-gradient(circle at 80% 10%, rgba(244, 179, 106, 0.18), transparent 26%),
          var(--screen);
      }

      .notch {
        position: absolute;
        z-index: 10;
        top: 0;
        left: 50%;
        width: 142px;
        height: 33px;
        transform: translateX(-50%);
        border-radius: 0 0 20px 20px;
        background: #050505;
      }

      .notch::before {
        position: absolute;
        content: "";
        top: 12px;
        left: 50%;
        width: 45px;
        height: 6px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #211f1e;
      }

      .status {
        position: absolute;
        z-index: 9;
        top: 14px;
        left: 25px;
        right: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .icons {
        display: flex;
        gap: 5px;
        align-items: center;
      }

      .signal,
      .wifi,
      .battery {
        display: inline-block;
      }

      .signal {
        width: 18px;
        height: 12px;
        background: linear-gradient(to right, #1d1713 22%, transparent 22% 32%, #1d1713 32% 54%, transparent 54% 64%, #1d1713 64%);
        clip-path: polygon(0 100%, 0 55%, 22% 55%, 22% 100%, 32% 100%, 32% 36%, 54% 36%, 54% 100%, 64% 100%, 64% 14%, 100% 14%, 100% 100%);
      }

      .wifi {
        width: 15px;
        height: 10px;
        border: 2px solid #1d1713;
        border-bottom: 0;
        border-left-color: transparent;
        border-right-color: transparent;
        border-radius: 14px 14px 0 0;
      }

      .battery {
        position: relative;
        width: 22px;
        height: 11px;
        border: 1.6px solid #1d1713;
        border-radius: 3px;
      }

      .battery::before {
        position: absolute;
        content: "";
        top: 2px;
        left: 2px;
        width: 13px;
        height: 5px;
        border-radius: 1px;
        background: #1d1713;
      }

      .battery::after {
        position: absolute;
        content: "";
        right: -4px;
        top: 3px;
        width: 2px;
        height: 5px;
        border-radius: 0 2px 2px 0;
        background: #1d1713;
      }

      .lock-screen,
      .app-screen {
        position: absolute;
        inset: 0;
        padding: 58px 22px 24px;
      }

      .lock-screen {
        z-index: 4;
        display: flex;
        flex-direction: column;
        align-items: center;
        background:
          linear-gradient(180deg, rgba(255, 248, 238, 0.48), rgba(255, 248, 238, 0.94)),
          radial-gradient(circle at 50% 38%, rgba(90, 150, 141, 0.22), transparent 34%);
        animation: lock-away 900ms ease 2700ms forwards;
      }

      .lock-time {
        margin-top: 46px;
        font-size: 68px;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lock-date {
        margin-top: 10px;
        color: var(--muted);
        font-size: 15px;
      }

      .notification {
        width: 100%;
        margin-top: 78px;
        padding: 15px 15px 16px;
        border: 1px solid rgba(234, 217, 199, 0.92);
        border-radius: 22px;
        background: rgba(255, 253, 248, 0.92);
        box-shadow: 0 18px 32px rgba(77, 54, 40, 0.12);
        opacity: 0;
        transform: translateY(18px);
        animation: notice-in 680ms cubic-bezier(0.2, 0.9, 0.2, 1) 520ms forwards;
      }

      .notice-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .notice-brand {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .app-dot {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: var(--coral);
        font-size: 13px;
      }

      .notification strong {
        display: block;
        margin-bottom: 6px;
        font-size: 16px;
      }

      .notification p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .swipe {
        margin-top: auto;
        margin-bottom: 16px;
        color: rgba(57, 34, 24, 0.52);
        font-size: 13px;
        opacity: 0;
        animation: fade-in 500ms ease 1500ms forwards;
      }

      .app-screen {
        z-index: 2;
        overflow: hidden;
        opacity: 0;
        transform: translateX(22px);
        animation: app-in 650ms ease 2980ms forwards;
      }

      .content {
        height: 100%;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        height: 42px;
      }

      .back {
        position: absolute;
        left: 0;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: var(--text);
        font-size: 28px;
        line-height: 1;
      }

      .title {
        font-size: 21px;
        font-weight: 800;
      }

      .hero {
        position: relative;
        height: 164px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(234, 217, 199, 0.72);
        background:
          linear-gradient(140deg, #f6ddbe 0%, #f8ead7 52%, #ffe6d8 100%);
        box-shadow: 0 14px 30px rgba(87, 60, 41, 0.1);
        opacity: 0;
        transform: translateY(12px);
        animation: item-in 560ms ease 3380ms forwards;
      }

      .table {
        position: absolute;
        left: -6px;
        right: -6px;
        bottom: -22px;
        height: 72px;
        border-radius: 50% 50% 0 0;
        background: rgba(232, 173, 102, 0.25);
      }

      .envelope {
        position: absolute;
        right: 56px;
        top: 49px;
        width: 124px;
        height: 78px;
        border-radius: 8px;
        background: #fff8ea;
        border: 2px solid rgba(221, 176, 121, 0.7);
        box-shadow: 0 14px 22px rgba(125, 88, 52, 0.12);
      }

      .envelope::before,
      .envelope::after {
        position: absolute;
        content: "";
        inset: 0;
      }

      .envelope::before {
        clip-path: polygon(0 0, 50% 55%, 100% 0);
        background: rgba(248, 221, 188, 0.72);
      }

      .envelope::after {
        clip-path: polygon(0 100%, 43% 42%, 50% 51%, 57% 42%, 100% 100%);
        background: #fff2dd;
      }

      .heart {
        position: absolute;
        right: 108px;
        top: 84px;
        width: 24px;
        height: 24px;
        transform: rotate(45deg);
        border-radius: 5px;
        background: var(--coral);
        box-shadow: 0 8px 16px rgba(243, 111, 94, 0.28);
      }

      .heart::before,
      .heart::after {
        position: absolute;
        content: "";
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--coral);
      }

      .heart::before {
        left: -12px;
      }

      .heart::after {
        top: -12px;
      }

      .plant {
        position: absolute;
        left: 40px;
        bottom: 31px;
        width: 46px;
        height: 62px;
        border-radius: 16px 16px 20px 20px;
        background: #9eb8a4;
      }

      .plant::before {
        position: absolute;
        content: "";
        left: 21px;
        bottom: 50px;
        width: 3px;
        height: 64px;
        border-radius: 999px;
        background: #799873;
      }

      .leaf {
        position: absolute;
        width: 23px;
        height: 13px;
        border-radius: 24px 0 24px 0;
        background: #879a62;
        transform-origin: right center;
      }

      .leaf.a {
        left: -18px;
        top: -34px;
        transform: rotate(54deg);
      }

      .leaf.b {
        left: 22px;
        top: -47px;
        transform: rotate(-32deg);
      }

      .leaf.c {
        left: 3px;
        top: -65px;
        transform: rotate(18deg);
      }

      .cup {
        position: absolute;
        right: 18px;
        bottom: 43px;
        width: 44px;
        height: 38px;
        border-radius: 7px 7px 16px 16px;
        background: #c8894d;
      }

      .cup::before {
        position: absolute;
        content: "";
        right: -15px;
        top: 9px;
        width: 18px;
        height: 17px;
        border: 4px solid #c8894d;
        border-left: 0;
        border-radius: 0 14px 14px 0;
      }

      .result {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 23px;
        opacity: 0;
        transform: translateY(12px);
        animation: item-in 520ms ease 3660ms forwards;
      }

      .check {
        width: 62px;
        height: 62px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: var(--sage);
        box-shadow: 0 14px 24px rgba(90, 150, 141, 0.2);
        font-size: 35px;
        font-weight: 800;
      }

      .result h1 {
        margin: 16px 0 6px;
        font-size: 25px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .result p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
        text-align: center;
      }

      .time {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
      }

      .card {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid rgba(234, 217, 199, 0.74);
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.86);
        box-shadow: 0 10px 22px rgba(75, 52, 37, 0.07);
        opacity: 0;
        transform: translateY(14px);
        animation: item-in 560ms ease 3920ms forwards;
      }

      .person {
        display: flex;
        align-items: center;
        gap: 13px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .avatar {
        position: relative;
        width: 54px;
        height: 54px;
        flex: 0 0 auto;
        overflow: hidden;
        border-radius: 50%;
        background: #f7d4ad;
      }

      .avatar::before {
        position: absolute;
        content: "";
        left: 11px;
        top: 8px;
        width: 32px;
        height: 29px;
        border-radius: 50% 50% 46% 46%;
        background: #4a2b1f;
      }

      .avatar::after {
        position: absolute;
        content: "";
        left: 15px;
        top: 20px;
        width: 24px;
        height: 26px;
        border-radius: 50%;
        background: #f3bd93;
        box-shadow: 0 22px 0 13px #5a968d;
      }

      .who {
        min-width: 0;
      }

      .who strong {
        display: block;
        margin-bottom: 3px;
        font-size: 17px;
      }

      .who span {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        margin-top: 6px;
        padding: 4px 9px;
        border-radius: 999px;
        color: var(--sage-dark);
        background: var(--sage-soft);
        font-size: 12px;
        font-weight: 700;
      }

      .message {
        margin-top: 14px;
      }

      .message h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .message-box {
        padding: 12px 13px;
        border-radius: 14px;
        color: var(--muted);
        background: #fff6eb;
        font-size: 14px;
        line-height: 1.58;
      }

      .privacy {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .privacy span {
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border-radius: 50%;
        color: #fff;
        background: var(--sage);
        font-size: 12px;
        font-weight: 800;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
        opacity: 0;
        transform: translateY(12px);
        animation: item-in 520ms ease 4240ms forwards;
      }

      .btn {
        height: 48px;
        border: 0;
        border-radius: 15px;
        font: inherit;
        font-size: 15px;
        font-weight: 800;
      }

      .btn.secondary {
        color: var(--sage-dark);
        background: #eaf4ef;
      }

      .btn.primary {
        color: #fff;
        background: linear-gradient(180deg, #f87c6b, var(--coral-dark));
        box-shadow: 0 12px 22px rgba(243, 111, 94, 0.22);
      }

      .home {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 126px;
        height: 5px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #0e0c0b;
      }

      .caption {
        position: fixed;
        left: 50%;
        bottom: 22px;
        display: none;
        align-items: center;
        gap: 10px;
        transform: translateX(-50%);
        color: rgba(57, 34, 24, 0.62);
        font-size: 13px;
      }

      .replay {
        height: 38px;
        padding: 0 15px;
        border: 1px solid rgba(90, 150, 141, 0.28);
        border-radius: 999px;
        color: var(--sage-dark);
        background: rgba(255, 253, 248, 0.72);
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(71, 48, 35, 0.09);
      }

      body.controls .caption {
        display: flex;
      }

      @keyframes stage-in {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes notice-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }

      @keyframes lock-away {
        to {
          opacity: 0;
          transform: translateX(-24px);
          pointer-events: none;
        }
      }

      @keyframes app-in {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes item-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-height: 780px) {
        .stage {
          width: min(88vw, 360px);
        }

        .caption {
          bottom: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" id="stage" aria-label="方舟监护人收到关怀提醒演示">
      <section class="phone">
        <div class="screen">
          <div class="notch"></div>
          <div class="status">
            <span>09:23</span>
            <span class="icons" aria-hidden="true">
              <span class="signal"></span>
              <span class="wifi"></span>
              <span class="battery"></span>
            </span>
          </div>

          <section class="lock-screen">
            <div class="lock-time">09:23</div>
            <div class="lock-date">周三，6 月 10 日</div>

            <article class="notification">
              <div class="notice-top">
                <span class="notice-brand"><span class="app-dot">方</span>方舟</span>
                <span>现在</span>
              </div>
              <strong>小舟可能需要你的关心</strong>
              <p>TA 刚刚确认向你发送这条提醒。方便的话，可以发一句问候或打个电话。</p>
            </article>

            <div class="swipe">轻触查看关怀提醒</div>
          </section>

          <section class="app-screen">
            <div class="content">
              <header class="topbar">
                <div class="back">‹</div>
                <div class="title">关怀提醒</div>
              </header>

              <section class="hero" aria-hidden="true">
                <div class="plant">
                  <span class="leaf a"></span>
                  <span class="leaf b"></span>
                  <span class="leaf c"></span>
                </div>
                <div class="envelope"></div>
                <div class="heart"></div>
                <div class="cup"></div>
                <div class="table"></div>
              </section>

              <section class="result">
                <div class="check">✓</div>
                <h1>小舟可能需要你的关心</h1>
                <p>TA 已在方舟里确认发送提醒，希望你现在留意一下。</p>
                <div class="time">今天 09:23</div>
              </section>

              <section class="card">
                <div class="person">
                  <div class="avatar"></div>
                  <div class="who">
                    <strong>小舟</strong>
                    <span>你的可信关怀对象</span>
                    <div class="pill">已确认发送给你</div>
                  </div>
                </div>

                <div class="message">
                  <h3>你可以这样回应 TA</h3>
                  <div class="message-box">
                    我看到提醒了，我在。<br />
                    现在方便聊两句吗？
                  </div>
                </div>

                <div class="privacy">
                  <span>i</span>
                  <div>方舟只发送经用户确认的关怀提醒，不展示 TA 的聊天原文、打卡答案或隐私细节。</div>
                </div>
              </section>

              <div class="actions">
                <button class="btn secondary">稍后提醒我</button>
                <button class="btn primary">发一句关心</button>
              </div>
            </div>
            <div class="home"></div>
          </section>
        </div>
      </section>
    </main>

    <div class="caption">
      <button class="replay" onclick="replay()">重播动画</button>
      <span>录屏时可只框选手机区域</span>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("controls") === "1") {
        document.body.classList.add("controls");
      }

      function replay() {
        const stage = document.getElementById("stage");
        const clone = stage.cloneNode(true);
        stage.replaceWith(clone);
      }
    </script>
  </body>
</html>
